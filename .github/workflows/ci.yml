name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Build core + CLI
        run: cargo build --release -p sap-odata-core -p sap-odata-cli

      - name: Build Tauri app (no bundle)
        # Verifies the desktop crate compiles + the frontend assets are
        # produced. `--no-bundle` skips installer/AppImage creation,
        # which we don't gate on (and which needs OS-specific tooling
        # that's not worth fighting here). Invoked via `npx tauri`
        # from the tauri-app dir rather than `npm run tauri --`
        # because npm 10 mis-parses `--ci` (expands it to `--cidr`),
        # so the `--no-bundle` flag never reaches Tauri and it tries
        # to build the MSI installer + fails on missing WiX. Going
        # through npx skips npm's flag-forwarding layer.
        working-directory: tauri-app
        run: |
          npm ci
          npx tauri build --ci --no-bundle

      - name: Run tests
        run: cargo test --workspace

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit
        run: cargo audit

  frontend-lint:
    name: Frontend safeHtml lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Forbid bare template-literal innerHTML
        # Untrusted SAP $metadata flows through innerHTML in many places.
        # Bare template literals (`el.innerHTML = `<x>${y}</x>`;`) are easy
        # to write without escaping and were the source of at least one
        # XSS-shaped bug (es.keys.join(',') interpolated raw). Policy: any
        # innerHTML assignment must be a quoted string, a pre-built variable,
        # or `safeHtml\`...\``.
        #
        # The Node script reads each target file as a single string so
        # multi-line forms (`el.innerHTML =\n  \`...\``) are caught — a gap
        # the prior line-oriented grep had. See scripts/lint-innerhtml.mjs
        # for the documented limitation around variable indirection.
        run: node scripts/lint-innerhtml.mjs
      - name: Renderer escape contract (parser/renderer boundary)
        # Pairs with crates/core/tests/malicious_content.rs (the parser
        # half). Imports the real escapeHtml / safeHtml / raw and asserts:
        # full OWASP 5-char escape; attribute-context breakout via `"` is
        # closed; the closure-private Symbol marker rejects JSON-shaped
        # __rawHtml forgeries; null/undefined coerce safely. CI-gated so a
        # future regression in html.js (e.g. dropping quote escaping)
        # fails the build immediately, not after a security review.
        run: node scripts/test-safe-html.mjs
