name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Build core + CLI
        run: cargo build --release -p sap-odata-core -p sap-odata-cli

      - name: Run tests
        run: cargo test -p sap-odata-core

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -p sap-odata-core -p sap-odata-cli -- -D warnings
        continue-on-error: true

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit
        run: cargo audit

  frontend-lint:
    name: Frontend safeHtml lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Forbid bare template-literal innerHTML
        # Untrusted SAP $metadata flows through innerHTML in many places.
        # Bare template literals (`el.innerHTML = `<x>${y}</x>`;`) are easy
        # to write without escaping and were the source of at least one
        # XSS-shaped bug (es.keys.join(',') interpolated raw). Policy: any
        # innerHTML assignment must be a quoted string, a pre-built variable,
        # or `safeHtml\`...\``. The grep below catches violations.
        run: |
          set -euo pipefail
          if grep -nP '\.innerHTML\s*=\s*`' tauri-app/src/*.js tauri-app/src/*.html; then
            echo "::error::bare template-literal innerHTML found — wrap with safeHtml\`...\` (see tauri-app/src/app.js)"
            exit 1
          fi
          echo "ok: no bare template-literal innerHTML sites"
